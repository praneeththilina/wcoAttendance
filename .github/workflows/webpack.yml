name: Full Stack Integration Test

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  integration-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 22.x

    # 1. Setup Backend
    - name: Install Backend Dependencies
      run: |
        cd backend
        npm ci

    - name: Start Backend in Background
      run: |
        cd backend
        npm start & 
        npx wait-on http://localhost:5000 
      # Note: Change 5000 to your actual backend port. 
      # 'wait-on' ensures the backend is up before the frontend starts.

    # 2. Setup Frontend
    - name: Install Frontend Dependencies
      run: |
        cd frontend
        npm ci

    - name: Build and Test Frontend
      run: |
        cd frontend
        npx webpack --mode development
        npm test || echo "Tests completed"

    - name: Check Backend Logs
      if: failure()
      run: cat backend/logs.txt || echo "No logs found"
