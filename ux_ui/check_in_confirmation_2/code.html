<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#2c1a4c",
                        "background-light": "#f7f6f8",
                        "background-dark": "#18141e",
                        "success": "#10b981",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.5rem", "lg": "0.5rem", "xl": "0.5rem", "full": "9999px"},
                },
            },
        }</script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen">
<div class="relative flex h-auto min-h-screen w-full max-w-md mx-auto flex-col bg-background-light dark:bg-background-dark overflow-x-hidden shadow-xl">
<div class="flex items-center p-4 pb-2 justify-between">
<div class="text-primary dark:text-slate-100 flex size-12 shrink-0 items-center justify-start">
<span class="material-symbols-outlined text-2xl">arrow_back</span>
</div>
<h2 class="text-slate-900 dark:text-slate-100 text-lg font-bold leading-tight tracking-tight flex-1 text-center pr-12">Check-in Status</h2>
</div>
<div class="flex flex-col px-6 py-8">
<div class="flex flex-col items-center gap-6">
<div class="flex items-center justify-center bg-success/10 rounded-full p-6">
<span class="material-symbols-outlined text-success text-7xl font-bold">check_circle</span>
</div>
<div class="flex max-w-full flex-col items-center gap-2">
<h1 class="text-slate-900 dark:text-slate-100 text-2xl font-bold leading-tight tracking-tight text-center">Checked In Successfully</h1>
<p class="text-slate-600 dark:text-slate-400 text-base font-normal leading-normal text-center">Your attendance for today's audit has been securely recorded.</p>
</div>
</div>
</div>
<div class="px-4 @container">
<div class="flex flex-col overflow-hidden rounded-lg border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 shadow-sm">
<div class="w-full bg-center bg-no-repeat aspect-[21/9] bg-cover" data-alt="Map showing GPS location of the headquarters" data-location="London" style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuDMxewifQmofotD5lH40h2e9tb2OnOt8ALf1tawkrrYKTZC77lAHYYG6YPaOQgsQF58OksV9lwmuERZf4oDXxV0JCJmISCX9xYx4JwBnpGsXq4Ah4VtkItzT3WEnFG2BM32L75tywNnltw7Hr9pq70VpWtRUWDxVq2a6_Qxi3OXPj-1P3T9gCDelsimJb7GuPuLC7f6Mi0dppBB7xzjoGuG_mqYR-3LXNg-fVBq3L5cA08reaFRvKQL8OfxqJaKBJcGwMFAgcYWhLG4");'>
</div>
<div class="flex flex-col p-5 gap-4">
<div class="flex items-start gap-3">
<div class="bg-primary/5 p-2 rounded-lg">
<span class="material-symbols-outlined text-primary">corporate_fare</span>
</div>
<div class="flex flex-col">
<p class="text-slate-500 dark:text-slate-400 text-xs font-semibold uppercase tracking-wider">Client Location</p>
<p class="text-slate-900 dark:text-slate-100 text-base font-bold">ABC Ltd. Headquarters</p>
</div>
</div>
<div class="grid grid-cols-2 gap-4 pt-2 border-t border-slate-100 dark:border-slate-800">
<div class="flex flex-col">
<p class="text-slate-500 dark:text-slate-400 text-xs font-semibold uppercase tracking-wider">Check-In Time</p>
<div class="flex items-center gap-1">
<span class="material-symbols-outlined text-slate-400 text-sm">schedule</span>
<p class="text-slate-900 dark:text-slate-100 text-sm font-medium">08:30 AM</p>
</div>
</div>
<div class="flex flex-col">
<p class="text-slate-500 dark:text-slate-400 text-xs font-semibold uppercase tracking-wider">Date</p>
<div class="flex items-center gap-1">
<span class="material-symbols-outlined text-slate-400 text-sm">calendar_today</span>
<p class="text-slate-900 dark:text-slate-100 text-sm font-medium">Monday, 10 Mar</p>
</div>
</div>
</div>
</div>
</div>
</div>
<div class="mt-auto p-6 flex flex-col gap-3">
<button class="flex flex-col overflow-hidden rounded-lg border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 shadow-sm">
<span>Go to Dashboard</span>
<span class="material-symbols-outlined text-lg">dashboard</span>
</button>
<button class="flex flex-col overflow-hidden rounded-lg border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 shadow-sm">
<span>Change Client</span>
<span class="material-symbols-outlined text-lg">edit_location_alt</span>
</button>
</div>
<div class="h-4"></div>
</div>
</body></html>
