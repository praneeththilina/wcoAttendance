<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Client Selection - Audit Attendance</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#2c1a4c",
                        "background-light": "#f7f6f8",
                        "background-dark": "#18141e",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "none": "0",
                        "sm": "0.125rem",
                        "DEFAULT": "0.5rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body { font-family: 'Inter', sans-serif; }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 font-display min-h-screen">
<div class="relative flex h-full min-h-screen w-full flex-col max-w-md mx-auto bg-background-light dark:bg-background-dark overflow-x-hidden">
<header class="sticky top-0 z-10 bg-background-light/80 dark:bg-background-dark/80 backdrop-blur-md">
<div class="flex items-center p-4 justify-between">
<button class="text-primary dark:text-primary/80 flex size-10 items-center justify-center rounded-full hover:bg-primary/10 transition-colors">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h2 class="text-slate-900 dark:text-slate-100 text-lg font-bold leading-tight tracking-tight flex-1 px-2 text-center">Select Location</h2>
<div class="size-10"></div>
</div>
<div class="px-4 pb-4">
<label class="flex flex-col w-full">
<div class="flex w-full items-stretch h-12 bg-primary/5 dark:bg-primary/20 border border-primary/10 rounded-lg">
<div class="text-primary/60 flex items-center justify-center pl-4">
<span class="material-symbols-outlined">search</span>
</div>
<input class="form-input flex w-full border-none bg-transparent focus:ring-0 text-slate-900 dark:text-slate-100 placeholder:text-primary/40 px-3 text-base font-normal" placeholder="Search clients or offices..." value=""/>
</div>
</label>
</div>
</header>
<main class="flex-1 overflow-y-auto">
<section class="px-4 py-2">
<h3 class="text-primary dark:text-primary/60 text-xs font-bold uppercase tracking-wider mb-3">Quick Actions</h3>
<div class="grid grid-cols-2 gap-3">
<button class="flex flex-col gap-2 border border-primary/10 bg-white dark:bg-primary/10 p-4 items-center justify-center text-center hover:border-primary transition-all group rounded-lg shadow-sm">
<div class="bg-primary/10 dark:bg-primary/20 p-3 rounded-full text-primary group-hover:bg-primary group-hover:text-white transition-colors">
<span class="material-symbols-outlined text-2xl">corporate_fare</span>
</div>
<span class="text-slate-900 dark:text-slate-100 text-sm font-semibold">HQ Office</span>
</button>
<button class="flex flex-col gap-2 border border-primary/10 bg-white dark:bg-primary/10 p-4 items-center justify-center text-center hover:border-primary transition-all group rounded-lg shadow-sm">
<div class="bg-primary/10 dark:bg-primary/20 p-3 rounded-full text-primary group-hover:bg-primary group-hover:text-white transition-colors">
<span class="material-symbols-outlined text-2xl">commute</span>
</div>
<span class="text-slate-900 dark:text-slate-100 text-sm font-semibold">Travel</span>
</button>
</div>
</section>
<section class="px-4 py-6">
<h3 class="text-primary dark:text-primary/60 text-xs font-bold uppercase tracking-wider mb-3">Pre-Approved Clients</h3>
<div class="flex flex-col gap-2">
<button class="flex items-center gap-4 p-4 bg-white dark:bg-primary/10 border border-primary/5 hover:border-primary/30 transition-all text-left rounded-lg">
<div class="size-10 flex items-center justify-center rounded-lg bg-primary/5 text-primary">
<span class="material-symbols-outlined">business</span>
</div>
<div class="flex-1">
<p class="font-semibold text-slate-900 dark:text-slate-100">ABC Ltd</p>
<p class="text-xs text-slate-500">London Financial District</p>
</div>
<span class="material-symbols-outlined text-slate-400 text-sm">chevron_right</span>
</button>
<button class="flex items-center gap-4 p-4 bg-white dark:bg-primary/10 border border-primary/5 hover:border-primary/30 transition-all text-left rounded-lg">
<div class="size-10 flex items-center justify-center rounded-lg bg-primary/5 text-primary">
<span class="material-symbols-outlined">account_balance</span>
</div>
<div class="flex-1">
<p class="font-semibold text-slate-900 dark:text-slate-100">XYZ PLC</p>
<p class="text-xs text-slate-500">Manchester Tech Park</p>
</div>
<span class="material-symbols-outlined text-slate-400 text-sm">chevron_right</span>
</button>
<button class="flex items-center gap-4 p-4 bg-white dark:bg-primary/10 border border-primary/5 hover:border-primary/30 transition-all text-left rounded-lg">
<div class="size-10 flex items-center justify-center rounded-lg bg-primary/5 text-primary">
<span class="material-symbols-outlined">local_shipping</span>
</div>
<div class="flex-1">
<p class="font-semibold text-slate-900 dark:text-slate-100">Global Exports</p>
<p class="text-xs text-slate-500">Liverpool Port Authority</p>
</div>
<span class="material-symbols-outlined text-slate-400 text-sm">chevron_right</span>
</button>
<button class="flex items-center gap-4 p-4 bg-white dark:bg-primary/10 border border-primary/5 hover:border-primary/30 transition-all text-left rounded-lg">
<div class="size-10 flex items-center justify-center rounded-lg bg-primary/5 text-primary">
<span class="material-symbols-outlined">factory</span>
</div>
<div class="flex-1">
<p class="font-semibold text-slate-900 dark:text-slate-100">Prime Manufacturing</p>
<p class="text-xs text-slate-500">Birmingham Industrial Estate</p>
</div>
<span class="material-symbols-outlined text-slate-400 text-sm">chevron_right</span>
</button>
<button class="flex items-center gap-4 p-4 bg-white dark:bg-primary/10 border border-primary/5 hover:border-primary/30 transition-all text-left rounded-lg">
<div class="size-10 flex items-center justify-center rounded-lg bg-primary/5 text-primary">
<span class="material-symbols-outlined">shopping_bag</span>
</div>
<div class="flex-1">
<p class="font-semibold text-slate-900 dark:text-slate-100">Retail Giant Co.</p>
<p class="text-xs text-slate-500">Oxford Street Hub</p>
</div>
<span class="material-symbols-outlined text-slate-400 text-sm">chevron_right</span>
</button>
</div>
</section>
</main>
<nav class="sticky bottom-0 bg-background-light dark:bg-background-dark border-t border-primary/10 flex items-center justify-around px-4 pb-6 pt-2">
<a class="flex flex-col items-center gap-1 text-[#2c1a4c]" href="#">
<span class="material-symbols-outlined">schedule</span>
<p class="text-xs font-medium">Attendance</p>
</a>
<a class="flex flex-col items-center gap-1 text-slate-500 dark:text-slate-400" href="#">
<span class="material-symbols-outlined">group</span>
<p class="text-xs font-medium">Clients</p>
</a>
<a class="flex flex-col items-center gap-1 text-slate-500 dark:text-slate-400" href="#">
<span class="material-symbols-outlined">person</span>
<p class="text-xs font-medium">Profile</p>
</a>
</nav>
</div>
</body></html>
